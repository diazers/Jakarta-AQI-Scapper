name: Scrape Region 2

on:
  schedule:
    - cron: '10 * * * *'  # every hour at :10  → 01:10, 02:10, 03:10 ...
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable

      - name: Install dependencies
        run: pip install selenium webdriver-manager PyGithub

      - name: Run scraper
        env:
          SCRAPER_GITHUB_TOKEN: ${{ secrets.SCRAPER_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python iqair_region2.py
