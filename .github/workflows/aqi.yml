name: Hourly AQI Scrape
on:
#  schedule:
#    - cron: "0 * * * *"   # fallback only, may be delayed
  workflow_dispatch:        # allows manual trigger from GitHub UI
  repository_dispatch:      # triggered by cron-job.org
    types: [hourly-aqi-scrape]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run AQI scraper
        run: python aqi_scraper.py
      - name: Commit updated data files
        run: |
          git config user.email "aqi-bot@noreply.github.com"
          git config user.name "AQI Bot"
          git add aqi_latest.json aqi_log.csv
          git diff --staged --quiet || \
            git commit -m "chore: AQI update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push
