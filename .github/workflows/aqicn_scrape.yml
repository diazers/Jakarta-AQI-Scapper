name: Hourly AQICN Scrape

on:
  # schedule:
  #   - cron: '0 * * * *'   # every hour at :00
  # workflow_dispatch:       # manual trigger from GitHub UI
    workflow_dispatch:        # allows manual trigger from GitHub UI
    repository_dispatch:      # triggered by cron-job.org
      types: [hourly-aqicn-scrape]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run AQICN scraper
        run: python aqicn_scraper.py

      - name: Commit and push updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aqicn_stations.csv
          git diff --cached --quiet || git commit -m "data: aqicn hourly scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
